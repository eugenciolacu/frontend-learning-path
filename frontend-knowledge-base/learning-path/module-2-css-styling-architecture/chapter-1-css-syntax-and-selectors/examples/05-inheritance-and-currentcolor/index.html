<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inheritance and currentColor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <article class="article-card">
      <h1>Inheritance in Practice</h1>
      <p>
        This paragraph inherits the article's text color and font family.
        <a href="#">This link also inherits the color</a> because the rule uses
        <code>inherit</code>.
      </p>
      <p class="badge">Inherited text can also drive border color with <code>currentColor</code>.</p>
    </article>
  </body>
</html>
