<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display Modes</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <h1>Display Modes</h1>

      <section class="demo-section">
        <h2>Block</h2>
        <div class="sample block-sample">Block elements start on a new line.</div>
        <div class="sample block-sample">This second block sits below the first.</div>
      </section>

      <section class="demo-section">
        <h2>Inline</h2>
        <p>
          <span class="sample inline-sample">Inline</span>
          <span class="sample inline-sample">elements</span>
          <span class="sample inline-sample">flow</span>
          inside text.
        </p>
      </section>

      <section class="demo-section">
        <h2>Inline-block</h2>
        <div class="sample inline-block-sample">Badge A</div>
        <div class="sample inline-block-sample">Badge B</div>
        <div class="sample inline-block-sample">Badge C</div>
      </section>

      <section class="demo-section">
        <h2>None</h2>
        <p>The hidden badge exists in the HTML but does not take up layout space.</p>
        <div class="sample hidden-sample">You should not see this.</div>
        <div class="sample visible-sample">Visible sibling</div>
      </section>
    </main>
  </body>
</html>
