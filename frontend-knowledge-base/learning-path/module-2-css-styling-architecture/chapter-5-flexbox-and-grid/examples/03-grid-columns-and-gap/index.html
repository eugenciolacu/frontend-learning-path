<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Example 3 - Grid Columns and Gap</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<main class="page">
		<header class="intro">
			<p class="eyebrow">Grid Basics</p>
			<h1>Grid defines rows and columns together.</h1>
			<p>The middle column below is intentionally wider to show how the `fr` unit distributes free space.</p>
		</header>

		<section class="grid" aria-label="Feature grid">
			<article class="tile">1fr column</article>
			<article class="tile feature">2fr column</article>
			<article class="tile">1fr column</article>
		</section>
	</main>
</body>
</html>
