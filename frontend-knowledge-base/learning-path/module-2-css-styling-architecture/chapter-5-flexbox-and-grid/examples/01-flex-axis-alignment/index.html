<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Example 1 - Flex Axes and Alignment</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<main class="page">
		<section class="panel">
			<p class="eyebrow">Flexbox Basics</p>
			<div class="toolbar">
				<div>
					<h1>Flex axes control alignment.</h1>
					<p>The heading block stays aligned with the button group by using one row-based flex container.</p>
				</div>
				<div class="actions" aria-label="Toolbar actions">
					<button type="button">Preview</button>
					<button type="button">Share</button>
					<button type="button">Export</button>
				</div>
			</div>

			<div class="chips" aria-label="Wrapped labels">
				<span>justify-content</span>
				<span>align-items</span>
				<span>flex-wrap</span>
				<span>gap</span>
				<span>main axis</span>
				<span>cross axis</span>
			</div>
		</section>
	</main>
</body>
</html>
