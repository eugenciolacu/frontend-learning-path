<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Example 4 - Grid Template Areas Dashboard</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div class="layout">
		<header class="header">
			<h1>Analytics Workspace</h1>
			<p>Named grid areas keep the structure readable and maintainable.</p>
		</header>

		<aside class="sidebar">
			<h2>Sidebar</h2>
			<ul>
				<li>Overview</li>
				<li>Traffic</li>
				<li>Revenue</li>
				<li>Export</li>
			</ul>
		</aside>

		<main class="main">
			<section class="panel large">
				<h2>Main Content</h2>
				<p>This area spans the central part of the dashboard.</p>
			</section>
			<section class="panel">Report A</section>
			<section class="panel">Report B</section>
		</main>

		<footer class="footer">
			Footer content stays at the bottom of the grid.
		</footer>
	</div>
</body>
</html>
