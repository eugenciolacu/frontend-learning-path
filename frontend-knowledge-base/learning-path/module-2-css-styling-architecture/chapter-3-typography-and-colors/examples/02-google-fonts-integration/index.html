<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Example 2 - Google Fonts Integration</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<main class="layout">
		<section class="panel">
			<p class="label">Google Fonts Demo</p>
			<h1>Inter is loaded from Google Fonts with only the weights this example needs.</h1>
			<p>
				Using a hosted web font gives the interface a more specific identity, but it should still degrade gracefully to a local fallback if the network request fails.
			</p>
			<p class="meta">Weights used here: 400, 600, 700</p>
		</section>
	</main>
</body>
</html>
