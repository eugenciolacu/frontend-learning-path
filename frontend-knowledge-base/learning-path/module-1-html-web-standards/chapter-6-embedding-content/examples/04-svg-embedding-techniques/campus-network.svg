<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-labelledby="title desc">
	<title id="title">Campus network diagram</title>
	<desc id="desc">A browser connects to a server, which connects to a database.</desc>
	<rect width="320" height="180" rx="18" fill="#e2e8f0"/>
	<rect x="20" y="60" width="80" height="50" rx="10" fill="#2563eb"/>
	<rect x="120" y="25" width="80" height="50" rx="10" fill="#0f766e"/>
	<rect x="220" y="95" width="80" height="50" rx="10" fill="#7c3aed"/>
	<line x1="100" y1="85" x2="120" y2="50" stroke="#334155" stroke-width="4"/>
	<line x1="200" y1="50" x2="220" y2="120" stroke="#334155" stroke-width="4"/>
	<text x="60" y="90" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="700">Browser</text>
	<text x="160" y="55" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="700">Server</text>
	<text x="260" y="125" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="700">DB</text>
</svg>