<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Embedded Lesson Widget</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			margin: 0;
			padding: 1.5rem;
			background: linear-gradient(135deg, #eff6ff, #f8fafc);
			color: #1e293b;
		}

		.card {
			background: #ffffff;
			border: 1px solid #cbd5e1;
			border-radius: 14px;
			padding: 1.25rem;
		}

		button {
			padding: 0.65rem 1rem;
			border: 0;
			border-radius: 999px;
			background: #2563eb;
			color: #ffffff;
			cursor: pointer;
		}
	</style>
</head>
<body>
	<section class="card">
		<h1>Embedded Lesson Widget</h1>
		<p>
			This content lives in a separate HTML document and is displayed inside an iframe.
			Because the parent page uses <code>sandbox="allow-scripts"</code>, the frame is restricted.
		</p>
		<button type="button" id="count-button">Clicked 0 times</button>
	</section>

	<script>
		const button = document.getElementById('count-button');
		let count = 0;

		button.addEventListener('click', () => {
			count += 1;
			button.textContent = `Clicked ${count} times`;
		});
	</script>
</body>
</html>
