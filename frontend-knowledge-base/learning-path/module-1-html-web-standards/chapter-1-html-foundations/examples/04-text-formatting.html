<!-- Example: Text Formatting -->
<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Text Formatting Example</title>
	</head>
	<body>
		<p><strong>Bold</strong> <em>Italic</em> <u>Underline</u> H<sub>2</sub>O x<sup>2</sup> <code>let x = 5;</code></p>

	</body>
</html>
