<!-- Example: Headings and Paragraphs -->
<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Headings and Paragraphs Example</title>
	</head>
	<body>
		<h1>Main Title (h1)</h1>
		<h2>Section Title (h2)</h2>
		<h3>Subsection (h3)</h3>
		<p>This is a paragraph of text. HTML paragraphs are defined with the <code>&lt;p&gt;</code> tag.</p>
	</body>
</html>
