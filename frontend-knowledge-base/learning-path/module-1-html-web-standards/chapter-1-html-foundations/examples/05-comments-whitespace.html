<!-- Example: Comments and Whitespace -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments and Whitespace Example</title>
  </head>
  <body>
    <!-- This is a comment. Comments are not displayed in the browser. -->
    <p>HTML    collapses     multiple spaces and newlines
    into a single space by default.</p>
    <pre>
      This    preserves    whitespace
      and line breaks.
    </pre>
  </body>
</html>
