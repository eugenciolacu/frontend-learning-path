<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mailto and Tel Links</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        margin: 2rem;
        max-width: 760px;
      }

      ul {
        padding-left: 1.25rem;
      }
    </style>
  </head>
  <body>
    <h1>Mailto and Tel Links</h1>
    <p>These links trigger actions instead of navigating to a normal web page.</p>

    <ul>
      <li>
        <a href="mailto:student.support@example.com">Email student support</a>
      </li>
      <li>
        <a href="mailto:student.support@example.com?subject=HTML%20Practice&body=Hello%2C%20I%20need%20help%20with%20anchor%20tags.">
          Email support with a prefilled subject and message
        </a>
      </li>
      <li>
        <a href="tel:+40123456789">Call the admissions office</a>
      </li>
    </ul>
  </body>
</html>
