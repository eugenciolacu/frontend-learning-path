<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Basics</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        margin: 2rem;
        max-width: 760px;
      }

      img {
        display: block;
        max-width: 100%;
        height: auto;
        border: 1px solid #d0d7de;
      }

      code {
        font-family: Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <h1>Image Basics</h1>

    <p>
      This example uses the core image attributes: <code>src</code>, <code>alt</code>, <code>title</code>, <code>width</code>, and <code>height</code>.
    </p>

    <img
      src="campus-lab.svg"
      alt="Students studying in a modern computer lab"
      title="Computer lab session"
      width="720"
      height="420"
    >
  </body>
</html>
