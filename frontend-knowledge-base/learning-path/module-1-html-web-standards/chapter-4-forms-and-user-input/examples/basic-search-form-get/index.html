<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Basic Search Form</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main class="card">
		<h1>Basic Search Form with GET</h1>
		<p>This example shows how a search form sends data in the URL query string.</p>

		<form action="https://example.com/search" method="get">
			<label for="search-query">Search term</label>
			<input
				id="search-query"
				name="q"
				type="text"
				placeholder="Try HTML forms"
				required
			>

			<label for="topic-filter">Topic</label>
			<select id="topic-filter" name="topic">
				<option value="all">All topics</option>
				<option value="html">HTML</option>
				<option value="css">CSS</option>
				<option value="javascript">JavaScript</option>
			</select>

			<button type="submit">Search</button>
		</form>
	</main>
</body>
</html>
